map $http_x_forwarded_proto $hf_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_x_forwarded_host $hf_forwarded_host {
    default $http_x_forwarded_host;
    ''      $host;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ^~ stops the SRS media regex below from hijacking /api/playback/live/*.m3u8
    location ^~ /api/ {
        proxy_pass http://control-api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hf_forwarded_proto;
        proxy_set_header X-Forwarded-Host $hf_forwarded_host;
    }

    # ^~ stops the SRS media regex below from hijacking /srs-media/*.m3u8
    location ^~ /srs-media/ {
        proxy_pass http://control-api:3001/srs-media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hf_forwarded_proto;
        proxy_set_header X-Forwarded-Host $hf_forwarded_host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
    }

    location /live/ {
        proxy_pass http://srs:8080/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /srs-api/ {
        proxy_pass http://srs:1985/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # SRS returns WHEP Location as /rtc/v1/... — proxy to API port if hit without /srs-api prefix
    location /rtc/ {
        proxy_pass http://srs:1985/rtc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Legacy SRS absolute paths in playlists (e.g. /gtch/stream.ts) — not /srs-media or /api
    location ~ ^/(?!srs-media|api|assets|embed)[^/]+/.+\.(m3u8|ts|flv)$ {
        proxy_pass http://srs:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Standalone embed bundle (no admin CSS) — fixes CORS when iframe has opaque/null origin
    location = /embed.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ^~ /embed {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri /embed.html;
    }

    location /assets/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
