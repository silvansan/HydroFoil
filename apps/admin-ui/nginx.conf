map $http_x_forwarded_proto $hf_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_x_forwarded_host $hf_forwarded_host {
    default $http_x_forwarded_host;
    ''      $host;
}

# Public site hostname → SRS ingest vhost (same value when PUBLIC_APP_URL matches publish host).
map $hf_forwarded_host $srs_playback_vhost {
    default $hf_forwarded_host;
    ''      $host;
}

map $hf_forwarded_proto $hf_hsts_header {
    https   "max-age=31536000; includeSubDomains";
    default "";
}

# Sandboxed iframe embeds send the literal header value "null" (opaque origin).
map $http_origin $embed_manifest_cors_origin {
    default $http_origin;
    ""      "";
    "null"  "null";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security $hf_hsts_header always;

    # ^~ stops the SRS media regex below from hijacking /api/playback/live/*.m3u8
    location = /api/playback/embed-manifest {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $embed_manifest_cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://control-api:3001/api/playback/embed-manifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hf_forwarded_proto;
        proxy_set_header X-Forwarded-Host $hf_forwarded_host;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin $embed_manifest_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    location ^~ /api/ {
        proxy_pass http://control-api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hf_forwarded_proto;
        proxy_set_header X-Forwarded-Host $hf_forwarded_host;
    }

    # ^~ stops the SRS media regex below from hijacking /srs-media/*.m3u8
    location ^~ /srs-media/ {
        proxy_pass http://control-api:3001/srs-media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hf_forwarded_proto;
        proxy_set_header X-Forwarded-Host $hf_forwarded_host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
    }

    location /live/ {
        proxy_pass http://srs:8080/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /srs-api/ {
        proxy_pass http://srs:1985/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # SRS returns WHEP Location as /rtc/v1/... — proxy to API port if hit without /srs-api prefix
    location /rtc/ {
        proxy_pass http://srs:1985/rtc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Public playback aliases — enforce privacy policy via control-api (not direct SRS).
    location ~ ^/(?!srs-media|api|assets|embed)([^/]+)/([^/]+)\.(m3u8|ts|flv)$ {
        proxy_pass http://control-api:3001/srs-media/$1/$2.$3;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $hf_forwarded_proto;
        proxy_set_header X-Forwarded-Host $hf_forwarded_host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
    }

    # Standalone embed bundle (no admin CSS) — partner sites iframe this page.
    # Omit frame-ancestors here: Chromium rejects frame-ancestors * for many parent origins
    # (see console hint to add https: explicitly). No frame-ancestors = embeddable anywhere.
    location = /embed.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: wss: blob:; media-src 'self' blob: https:; object-src 'none'; base-uri 'self'" always;
        try_files $uri =404;
    }

    location ^~ /embed {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: wss: blob:; media-src 'self' blob: https:; object-src 'none'; base-uri 'self'" always;
        try_files $uri /embed.html;
    }

    location /assets/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss: blob:; media-src 'self' blob: https:; frame-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
