# Production overlay — use with an env file (see .env.prod.example).
#
#   cp .env.prod.example .env.prod   # edit secrets first
#   npm run docker:prod
#
# CI / local smoke may omit .env.prod; dev fallbacks below apply only when unset.

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hydrofoil_dev}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  migrate:
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hydrofoil:hydrofoil_dev@postgres:5432/hydrofoil}

  control-api:
    build:
      context: .
      dockerfile: apps/control-api/Dockerfile
    container_name: hydrofoil-control-api
    environment:
      NODE_ENV: production
      PORT: 3001
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql://hydrofoil:hydrofoil_dev@postgres:5432/hydrofoil}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DEFAULT_ORGANIZATION_SLUG: ${DEFAULT_ORGANIZATION_SLUG:-default}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@hydrofoil.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-me-now}
      DEFAULT_ADMIN_DISPLAY_NAME: ${DEFAULT_ADMIN_DISPLAY_NAME:-HydroFoil Admin}
      DEFAULT_ADMIN_ROLE: ${DEFAULT_ADMIN_ROLE:-super-admin}
      DEFAULT_ADMIN_ACTIVE: ${DEFAULT_ADMIN_ACTIVE:-true}
      DEFAULT_ADMIN_SYNC_PASSWORD: ${DEFAULT_ADMIN_SYNC_PASSWORD:-false}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-hydrofoil-dev-auth-secret}
      PLAYBACK_TOKEN_SECRET: ${PLAYBACK_TOKEN_SECRET:-hydrofoil-dev-playback-secret}
      PLAYBACK_TOKEN_TTL_SECONDS: ${PLAYBACK_TOKEN_TTL_SECONDS:-3600}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3080}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      SRS_HTTP_API_URL: ${SRS_HTTP_API_URL:-http://srs:1985}
      SRS_PLAYBACK_BASE_URL: ${SRS_PLAYBACK_BASE_URL:-http://srs:8080}
      SRS_RTMP_FORWARD_BASE: ${SRS_RTMP_FORWARD_BASE:-rtmp://127.0.0.1:1935}
      SRS_RTMP_READ_BASE: ${SRS_RTMP_READ_BASE:-rtmp://srs:1935}
      SRS_WEBHOOK_SECRET: ${SRS_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_ADMIN_TO: ${SMTP_ADMIN_TO:-}
    volumes: !reset []
    command: !reset null
    working_dir: !reset null
    ports:
      - '${CONTROL_API_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  media-worker:
    build:
      context: .
      dockerfile: apps/media-worker/Dockerfile
    container_name: hydrofoil-media-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://hydrofoil:hydrofoil_dev@postgres:5432/hydrofoil}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      SRS_HTTP_API_URL: ${SRS_HTTP_API_URL:-http://srs:1985}
      SRS_RTMP_READ_BASE: ${SRS_RTMP_READ_BASE:-rtmp://srs:1935}
      SRS_DVR_ROOT: /srs-dvr
      RECORDING_TRANSCODE_HLS: ${RECORDING_TRANSCODE_HLS:-true}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
    volumes:
      - srs_data:/srs-dvr:ro
    command: !reset null
    working_dir: !reset null
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-api:
        condition: service_started

  admin-ui:
    build:
      context: .
      dockerfile: apps/admin-ui/Dockerfile
      args:
        VITE_WEBRTC_ICE_SERVERS: ${VITE_WEBRTC_ICE_SERVERS:-stun:stun.l.google.com:19302}
    container_name: hydrofoil-admin-ui
    environment: {}
    volumes: !reset []
    command: !reset null
    working_dir: !reset null
    ports:
      - '${ADMIN_UI_PORT:-3080}:80'
    depends_on:
      control-api:
        condition: service_started
      srs:
        condition: service_started
