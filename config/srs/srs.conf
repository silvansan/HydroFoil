# HydroFoil — SRS 5 config (see trunk/conf/http.hooks.callback.conf)
# Ingest: rtmp://<host>:1935/live/<streamKey>

max_connections     1000;
srs_log_tank        console;

rtmp {
    listen          1935;
}

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# SRT ingest (OBS, vMix, FFmpeg) — publish with streamid #!::r=live/<key>,m=publish
srt_server {
    enabled         on;
    listen          10080;
    default_app     live;
}

# WebRTC / WHEP low-latency playback (browser monitor)
rtc_server {
    enabled         on;
    listen          8000;
    # Browser on host reaches SRS via published UDP port — set CANDIDATE env in Docker if needed
    candidate       127.0.0.1;
}

# OBS often connects with vhost=localhost — hooks must exist on both vhosts.
vhost localhost {
    http_hooks {
        enabled         on;
        on_publish      http://control-api:3001/api/webhooks/srs;
        on_unpublish    http://control-api:3001/api/webhooks/srs;
    }
    forward {
        enabled         on;
        backend         http://control-api:3001/api/webhooks/srs/forward;
    }
    hls {
        enabled             on;
        hls_path            ./objs/nginx/html;
        hls_fragment        2;
        hls_window          10;
        hls_wait_keyframe   on;
        hls_dispose         3;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    dvr {
        enabled             on;
        dvr_path            ./objs/nginx/html/dvr/[app]/[stream].[timestamp].flv;
        dvr_plan            session;
        dvr_wait_keyframe   on;
    }
    rtc {
        enabled         on;
        rtmp_to_rtc     on;
        rtc_to_rtmp     on;
    }
    srt {
        enabled         on;
        srt_to_rtmp     on;
    }
}

vhost __defaultVhost__ {
    http_hooks {
        enabled         on;
        on_publish      http://control-api:3001/api/webhooks/srs;
        on_unpublish    http://control-api:3001/api/webhooks/srs;
    }
    forward {
        enabled         on;
        backend         http://control-api:3001/api/webhooks/srs/forward;
    }
    hls {
        enabled             on;
        hls_path            ./objs/nginx/html;
        hls_fragment        2;
        hls_window          10;
        hls_wait_keyframe   on;
        hls_dispose         3;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    dvr {
        enabled             on;
        dvr_path            ./objs/nginx/html/dvr/[app]/[stream].[timestamp].flv;
        dvr_plan            session;
        dvr_wait_keyframe   on;
    }
    rtc {
        enabled         on;
        rtmp_to_rtc     on;
        rtc_to_rtmp     on;
    }
    srt {
        enabled         on;
        srt_to_rtmp     on;
    }
}
